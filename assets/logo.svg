<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" fill="none">
  <defs>
    <linearGradient id="moonGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#60A5FA;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#A78BFA;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="lensGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#A78BFA;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F472B6;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Moon crescent -->
  <circle cx="55" cy="60" r="35" fill="url(#moonGrad)"/>
  <circle cx="70" cy="50" r="28" fill="#0F172A"/>
  <!-- Lens ring -->
  <circle cx="55" cy="60" r="38" stroke="url(#lensGrad)" stroke-width="3" fill="none" opacity="0.6"/>
  <!-- Lens flare dot -->
  <circle cx="42" cy="42" r="4" fill="#60A5FA" opacity="0.8"/>
  <!-- Text -->
  <text x="110" y="72" font-family="system-ui, -apple-system, sans-serif" font-size="48" font-weight="700" fill="white">
    Luna<tspan fill="#A78BFA">Lens</tspan>
  </text>
</svg>
