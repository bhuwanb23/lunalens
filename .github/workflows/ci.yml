name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend/website
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/website/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm audit --audit-level=high
      - run: npm run build

  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: backend/server/requirements.txt
      - name: Install dependencies
        run: pip install -r backend/server/requirements.txt ruff
      - name: Lint with ruff
        run: ruff check backend/
      - name: Compile Python modules
        run: |
          python -m py_compile backend/server/app.py
          python -m py_compile backend/server/database.py
          python -m py_compile backend/server/config.py
          python -m py_compile backend/server/security_config.py
          python -m py_compile backend/server/models.py
