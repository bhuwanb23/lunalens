name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend/website
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/website/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run build

  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install lightweight backend deps
        run: pip install Flask Flask-CORS Flask-SQLAlchemy Flask-Migrate PyJWT python-dotenv Werkzeug numpy SQLAlchemy
      - name: Compile Python modules
        run: |
          python -m py_compile backend/server/app.py backend/server/database.py backend/server/setup_database.py backend/server/config.py backend/server/security_config.py backend/server/models.py
          python -m py_compile backend/boulder_detection/main.py backend/boulder_detection/detector.py backend/boulder_detection/ml_models.py backend/boulder_detection/gradcam.py backend/boulder_detection/measurements.py backend/boulder_detection/transforms.py
